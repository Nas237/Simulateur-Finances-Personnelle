<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mes Finances Pro</title>
<meta name="description" content="Simulateur de finances personnelles — budget, épargne, dettes, projection">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances Pro">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#ffffff12;
  --text:#f0f2f8;--muted:#8892a4;--accent:#5b8cf7;--green:#3ecf8e;
  --amber:#f5a623;--red:#ef5959;--purple:#a78bfa;
  --font-head:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif;
  --radius:12px;--radius-sm:8px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;transition:background .3s,color .3s}

/* WELCOME */
#welcome-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px;overflow-y:auto}
#welcome-screen.hidden{display:none}
.welcome-box{max-width:440px;width:100%;text-align:center;padding:20px 0}
.welcome-deco{font-family:var(--font-head);font-size:52px;opacity:.1;line-height:1;margin-bottom:14px}
.welcome-box h1{font-family:var(--font-head);font-size:34px;margin-bottom:6px}
.welcome-box .tagline{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.7}
.welcome-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:22px;text-align:start}
.w-label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.w-input,.w-select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:14px;padding:11px 14px;border-radius:var(--radius-sm);outline:none;transition:border .2s}
.w-input:focus,.w-select:focus{border-color:var(--accent)}
.w-select option{background:var(--surface)}
.lang-grid{display:flex;gap:8px}
.lang-btn{flex:1;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .2s;text-align:center}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.lang-btn:hover:not(.active){border-color:var(--accent);color:var(--text)}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-swatch{border-radius:var(--radius-sm);border:2px solid transparent;cursor:pointer;overflow:hidden;transition:all .2s}
.theme-swatch.active{border-color:var(--accent)}
.theme-swatch:hover{transform:scale(1.02)}
.swatch-colors{height:32px;display:flex}
.swatch-seg{flex:1}
.swatch-label{font-size:11px;padding:5px 8px;background:var(--surface2);color:var(--muted)}
.mode-row{display:flex;gap:6px;margin-top:8px}
.mode-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.25)}
.btn-start{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;margin-top:6px}
.btn-start:hover{opacity:.88}

/* APP */
.app{max-width:960px;margin:0 auto;padding:0 0 60px}
.app-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px}
.app-header h1{font-family:var(--font-head);font-size:22px}
.app-header p{font-size:13px;color:var(--muted);margin-top:2px}
.header-controls{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-bottom:2px}
.hdr-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:12px;padding:5px 10px;border-radius:var(--radius-sm);outline:none;cursor:pointer}
.hdr-select option{background:var(--surface)}
.theme-dot{width:20px;height:20px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0}
.theme-dot.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.mode-mini{padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all .2s}
.mode-mini.active{background:var(--surface2);color:var(--text)}
.vsep{width:1px;height:18px;background:var(--border)}

.nav{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:11px 14px;border:none;background:none;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .2s}
.nav-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.nav-btn:hover:not(.active){color:var(--text)}

.section{display:none;padding:24px}
.section.active{display:block}
.sec-head{font-family:var(--font-head);font-size:22px;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.card-val{font-size:20px;font-weight:300;font-family:var(--font-head)}
.card-val.green{color:var(--green)}.card-val.red{color:var(--red)}.card-val.accent{color:var(--accent)}.card-val.amber{color:var(--amber)}.card-val.purple{color:var(--purple)}
.card-sub{font-size:10px;color:var(--muted);margin-top:3px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.panel-title{font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px;font-weight:500}

.prog-row{margin-bottom:11px}
.prog-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.prog-head span:first-child{color:var(--muted)}
.prog-track{height:5px;background:var(--surface2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .6s ease}

.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sl-row label{font-size:13px;color:var(--muted);width:165px;flex-shrink:0}
.sl-row input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.sl-val{font-size:13px;font-weight:500;width:90px;text-align:right;color:var(--text)}
/* Projection manual input rows */
.proj-row{margin-bottom:14px}
.proj-row-label{font-size:13px;color:var(--muted);margin-bottom:6px}
.proj-row-controls{display:flex;align-items:center;gap:8px}
.proj-row-controls input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.proj-manual-input{width:80px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:500;padding:5px 8px;border-radius:var(--radius-sm);outline:none;text-align:right;transition:border .2s}
.proj-manual-input:focus{border-color:var(--accent)}
/* Ensure sliders inside scenario-box are fully flexible */
.scenario-box .proj-row-controls input[type=range]{min-width:60px}
.scenario-box .proj-row{margin-bottom:12px}

.field-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.field-row label{width:132px;font-size:13px;color:var(--muted);flex-shrink:0}
.field-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);outline:none;transition:border .2s}
.field-row input:focus{border-color:var(--accent)}

.bgt-meter{height:13px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:16px}
.bgt-seg{height:100%}

.goal-item{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px}
.toggle-row{display:flex;gap:6px;margin-bottom:14px}
.toggle-btn{font-size:11px;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chart-wrap{position:relative;width:100%;height:220px}

.donut-legend{display:flex;flex-direction:column;gap:7px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.legend-right{display:flex;justify-content:space-between;flex:1}
.legend-pct{color:var(--muted)}

/* DETTES */
.tabs-debt{display:flex;gap:8px;margin-bottom:18px}
.tab-debt-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .2s}
.tab-debt-btn.active{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,.2)}
.debt-section{display:none}.debt-section.active{display:block}
.debt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.debt-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.debt-name{font-size:15px;font-weight:500}
.debt-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
.badge-loan{background:rgba(239,89,89,.12);color:var(--red)}
.badge-credit{background:rgba(165,139,250,.12);color:var(--purple)}
.badge-owed{background:rgba(62,207,142,.12);color:var(--green)}
.debt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.debt-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:9px 11px}
.debt-stat-label{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.debt-stat-val{font-size:15px;font-weight:400;font-family:var(--font-head)}
.debt-actions{display:flex;gap:7px;flex-wrap:wrap}

.btn-small{padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:all .2s}
.btn-small:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
.btn-small.primary{border-color:var(--accent);color:var(--accent)}
.btn-small.primary:hover{background:rgba(91,140,247,.1)}
.btn-small.danger{border-color:var(--red);color:var(--red)}
.btn-small.danger:hover{background:rgba(239,89,89,.1)}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:1px solid var(--accent);background:none;color:var(--accent);font-family:var(--font-body);font-size:13px;cursor:pointer;margin-bottom:14px;transition:all .2s}
.btn-add:hover{background:rgba(91,140,247,.08)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
.empty-state div{font-size:30px;margin-bottom:10px;opacity:.4}

/* TRACKER */
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.month-nav button{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.month-nav button:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
.month-nav span{font-size:15px;font-weight:500;min-width:140px;text-align:center}
.tracker-top{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:600px){.tracker-top{grid-template-columns:1fr}}
.tracker-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.form-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.04em}
.form-field input,.form-field select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);outline:none;transition:border .2s}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field select option{background:var(--surface2)}
.new-cat-row{display:none;margin-top:8px;gap:7px}
.new-cat-row.visible{display:flex}
.new-cat-row input{flex:1;background:var(--surface2);border:1px solid var(--accent);color:var(--text);font-family:var(--font-body);font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);outline:none}
.btn-submit{width:100%;padding:9px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .2s}
.btn-submit:hover{opacity:.88}
.expense-entry{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface2);border-radius:9px;margin-bottom:6px}
.entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.entry-info{flex:1;min-width:0}
.entry-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:11px;color:var(--muted);margin-top:1px}
.entry-amount{font-size:14px;font-weight:500;color:var(--red);flex-shrink:0}
.entry-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:5px;transition:color .2s}
.entry-del:hover{color:var(--red)}
.cat-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.cat-pill{padding:4px 11px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:var(--font-body);transition:all .2s}
.cat-pill.active{color:#fff;border-color:transparent}

/* PROJ */
.scenario-box{background:var(--surface2);border-radius:10px;padding:13px 15px;margin-bottom:13px;border:1px solid var(--border)}
.scenario-toggle{display:flex;align-items:center;gap:9px;margin-bottom:10px;font-size:13px}
.scenario-toggle input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}

/* MODALS */
.modal-overlay,.goal-modal-overlay,.amort-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open,.goal-modal-overlay.open,.amort-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:24px;width:400px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-family:var(--font-head);font-size:19px;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:13px;cursor:pointer}
.btn-cancel:hover{color:var(--text)}
.btn-save{padding:8px 20px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer}
.btn-save:hover{opacity:.88}
.amort-modal{background:var(--surface);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:22px;width:520px;max-width:100%;max-height:90vh;display:flex;flex-direction:column}
.amort-scroll{overflow-y:auto;flex:1;margin-top:10px}
.amort-table{width:100%;border-collapse:collapse;font-size:12px}
.amort-table th{color:var(--muted);font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
.amort-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.amort-table tr:hover td{background:var(--surface2)}

/* ── AI DIAGNOSIS ── */
.diagnosis-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:18px}
.diag-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.diag-title{font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;font-weight:500}
.diag-refresh-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:var(--font-body);font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.diag-refresh-btn:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
.diag-refresh-btn:disabled{opacity:.4;cursor:not-allowed}

.diag-status{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:14px 16px;border-radius:10px;border:1px solid}
.diag-status.surplus{background:rgba(62,207,142,.07);border-color:rgba(62,207,142,.2)}
.diag-status.deficit{background:rgba(239,89,89,.07);border-color:rgba(239,89,89,.2)}
.diag-status.balanced{background:rgba(245,166,35,.07);border-color:rgba(245,166,35,.2)}
.diag-icon{font-size:28px;flex-shrink:0}
.diag-status-text{flex:1}
.diag-status-label{font-size:12px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.diag-status-amount{font-family:var(--font-head);font-size:24px}
.diag-status.surplus .diag-status-amount{color:var(--green)}
.diag-status.deficit .diag-status-amount{color:var(--red)}
.diag-status.balanced .diag-status-amount{color:var(--amber)}

.diag-score-wrap{display:flex;align-items:center;gap:12px;flex-shrink:0}
.diag-score-ring{position:relative;width:56px;height:56px}
.diag-score-ring svg{transform:rotate(-90deg)}
.diag-score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:16px;font-weight:400}
.diag-score-label{font-size:10px;color:var(--muted);text-align:center;margin-top:2px}

.diag-tips{display:flex;flex-direction:column;gap:9px}
.diag-tip{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;background:var(--surface2);border-radius:9px;font-size:13px;line-height:1.55}
.diag-tip-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.diag-tip-text{color:var(--text);flex:1}
.diag-tip-text strong{color:var(--accent)}

.diag-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:12px;color:var(--muted);font-size:13px}
.diag-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.diag-error{padding:16px;background:rgba(239,89,89,.06);border:1px solid rgba(239,89,89,.2);border-radius:9px;color:var(--red);font-size:13px;text-align:center}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome-screen">
  <div class="welcome-box">
    <div class="welcome-deco">₊</div>
    <h1 id="w-title">Mes Finances Pro</h1>
    <p class="tagline" id="w-tagline">Votre simulateur personnel de budget,<br>d'épargne et de projection patrimoniale.</p>
    <div class="welcome-fields">
      <div>
        <span class="w-label" id="w-lbl-lang">Langue</span>
        <div class="lang-grid">
          <button class="lang-btn active" onclick="setLang('fr',this)">🇫🇷 Français</button>
          <button class="lang-btn" onclick="setLang('en',this)">🇬🇧 English</button>
        </div>
      </div>
      <div>

const PALETTES = [
  { id:'midnight',
    name:{fr:'Minuit',en:'Midnight'},
    colors:['#5b8cf7','#3ecf8e','#f5a623','#a78bfa'],
    dark:{bg:'#0f1117',surface:'#181c27',surface2:'#1e2333',border:'#ffffff12',text:'#f0f2f8',muted:'#8892a4',accent:'#5b8cf7',green:'#3ecf8e',amber:'#f5a623',red:'#ef5959',purple:'#a78bfa'},
    light:{bg:'#f4f6fb',surface:'#ffffff',surface2:'#eef1f8',border:'#00000010',text:'#1a1f2e',muted:'#6b7489',accent:'#3b6fd4',green:'#16a066',amber:'#d4890a',red:'#d63030',purple:'#7c5cbf'} },
  { id:'forest',
    name:{fr:'Forêt',en:'Forest'},
    colors:['#2dd4a0','#4ade80','#fbbf24','#c084fc'],
    dark:{bg:'#0d1412',surface:'#141f1c',surface2:'#192620',border:'#ffffff12',text:'#e8f4f0',muted:'#7a9e95',accent:'#2dd4a0',green:'#4ade80',amber:'#fbbf24',red:'#f87171',purple:'#c084fc'},

];

let currentPalette = 'midnight';
let currentMode = 'dark';

function applyTheme(palId, mode) {
  currentPalette = palId; currentMode = mode;
  const pal = PALETTES.find(p => p.id === palId);
  Object.entries(pal[mode]).forEach(([k,v]) => document.documentElement.style.setProperty('--'+k, v));
  ['dark','light'].forEach(m => {
    ['mode-dark-w','mode-mini-d'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',m==='dark'&&mode==='dark');});
    ['mode-light-w','mode-mini-l'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',m==='light'&&mode==='light');});
  });
  buildThemeSwatches('welcome-theme-grid');
  buildHdrDots();
  saveAll();
}
function setMode(mode) { applyTheme(currentPalette, mode); }
function selectPalette(id) { applyTheme(id, currentMode); }

function buildThemeSwatches(containerId) {
  const el = document.getElementById(containerId); if(!el) return;
  el.innerHTML = PALETTES.map(p => `
    <div class="theme-swatch${p.id===currentPalette?' active':''}" onclick="selectPalette('${p.id}')">
      <div class="swatch-colors">${p.colors.map(c=>`<div class="swatch-seg" style="background:${c}"></div>`).join('')}</div>
      <div class="swatch-label">${p.name[currentLang]||p.name.fr}</div>
    </div>`).join('');
}
function buildHdrDots() {
  const el = document.getElementById('hdr-theme-dots'); if(!el) return;
  el.innerHTML = PALETTES.map(p => {
    const g = `linear-gradient(135deg,${p.colors[0]},${p.colors[3]})`;
    return `<div class="theme-dot${p.id===currentPalette?' active':''}" style="background:${g}" onclick="selectPalette('${p.id}')" title="${p.name[currentLang]||p.name.fr}"></div>`;
  }).join('');
}

const RATES={EUR:1,USD:1.08,XAF:655.96,XOF:655.96,GBP:0.86,CHF:0.97,MAD:10.8,TND:3.35,DZD:145,CAD:1.47};
const SYMBOLS={EUR:'€',USD:'$',XAF:'FCFA',XOF:'FCFA',GBP:'£',CHF:'CHF',MAD:'MAD',TND:'TND',DZD:'DA',CAD:'CA$'};
const SYM_BEFORE=['USD','GBP','CAD'];
let currentCurrency='EUR';

function fmtCur(v){ const n=Math.round(v);const s=n.toLocaleString('fr-FR');const sym=SYMBOLS[currentCurrency];return SYM_BEFORE.includes(currentCurrency)?sym+s:s+' '+sym; }
function fmtK(v){ if(v>=1e6)return fmtCur(v/1e6)+'M';if(v>=1000)return Math.round(v/1000)+'k '+SYMBOLS[currentCurrency];return fmtCur(v); }

function convertAllTo(code){
  if(code===currentCurrency)return;
  const r=RATES[code]/RATES[currentCurrency];
  incomes.forEach(i=>i.val=Math.round(i.val*r));
  expenses.forEach(e=>e.val=Math.round(e.val*r));
  goals.forEach(g=>{g.target=Math.round(g.target*r);g.saved=Math.round(g.saved*r);});
  debts.forEach(d=>{d.capital=Math.round(d.capital*r);d.remaining=Math.round(d.remaining*r);d.monthly=Math.round(d.monthly*r);});
  oweds.forEach(o=>o.amount=Math.round(o.amount*r));
  trackerEntries.forEach(te=>te.amount=Math.round(te.amount*r*100)/100);
  const ps=document.getElementById('ps-monthly');if(ps)ps.value=Math.round(+ps.value*r);
  const pss=document.getElementById('ps-start');if(pss)pss.value=Math.round(+pss.value*r);
  currentCurrency=code;
  document.getElementById('cur-select').value=code;
  renderAll();
}

const savings=()=>totalIncome()-totalExpenses(); // surplus brut

const calcTotalDue=()=>debts.reduce((s,d)=>s+d.remaining,0);
const calcMonthlyDebt=()=>debts.reduce((s,d)=>s+d.monthly,0);
const calcTotalOwed=()=>oweds.reduce((s,o)=>s+o.amount,0);
function calcTotalInterests(){return debts.reduce((s,d)=>{if(!d.rate)return s;const r=d.rate/100/12;if(d.monthly<=d.remaining*r)return s;const n=Math.ceil(Math.log(d.monthly/(d.monthly-d.remaining*r))/Math.log(1+r));return s+Math.max(0,Math.round(d.monthly*n-d.remaining));},0);}
function monthsLeft(d){if(!d.rate)return d.monthly>0?Math.ceil(d.remaining/d.monthly):0;const r=d.rate/100/12;if(d.monthly<=d.remaining*r)return 999;return Math.ceil(Math.log(d.monthly/(d.monthly-d.remaining*r))/Math.log(1+r));}
function debtProgress(d){return d.capital>0?Math.min(100,Math.round((1-d.remaining/d.capital)*100)):0;}

function trackerMonthEntries(){return trackerEntries.filter(e=>{const d=new Date(e.date);return d.getFullYear()===trackerYear&&d.getMonth()===trackerMonth;});}

function calcHealthScore(){
  const inc=totalIncome(); if(inc<=0)return 0;
  const sav=savings(); const savRate=sav/inc;
  const debtRatio=calcMonthlyDebt()/inc;
  const trackerTotal=trackerCurrentMonthTotal();
  const expRatio=trackerTotal>0?trackerTotal/inc:totalExpenses()/inc;
  let score=100;
  // Savings rate: ideal ≥ 20%
  if(savRate<0)score-=30;
  else if(savRate<0.05)score-=20;
  else if(savRate<0.1)score-=12;
  else if(savRate<0.2)score-=5;
  // Debt ratio: ideal < 30%
  if(debtRatio>0.5)score-=25;
  else if(debtRatio>0.35)score-=15;
  else if(debtRatio>0.2)score-=7;
  // Expense ratio vs income
  if(expRatio>0.95)score-=20;
  else if(expRatio>0.8)score-=10;
  else if(expRatio>0.7)score-=5;
  return Math.max(0,Math.min(100,Math.round(score)));
}

function buildFinancialContext(){
  const inc=totalIncome(), exp=totalExpenses(), sav=savings();
  const debtTotal=calcTotalDue(), monthlyDebt=calcMonthlyDebt();
  const trackerTotal=trackerCurrentMonthTotal();
  const trackerEntiesMonth=trackerMonthEntries();
  const catBreakdown={};
  trackerEntiesMonth.forEach(e=>{catBreakdown[e.category]=(catBreakdown[e.category]||0)+e.amount;});
  const topExpenses=expenses.map(e=>({name:e.label,val:e.val})).sort((a,b)=>b.val-a.val).slice(0,4);
  const score=calcHealthScore();
  return {inc,exp,sav,debtTotal,monthlyDebt,trackerTotal,topExpenses,catBreakdown,score,currency:SYMBOLS[currentCurrency],savRate:inc>0?Math.round(sav/inc*100):0,debtRatio:inc>0?Math.round(monthlyDebt/inc*100):0};
}

      <div class="card"><div class="card-label">${t('lbl_free')}</div><div class="card-val ${argentLibre>=0?'green':'red'}">${fmtCur(argentLibre)}</div><div class="card-sub">${currentLang==='fr'?'Après épargne auto':'After auto savings'}</div></div>

  const groups=[

    {label:t('g_savings'),val:epargneNette,color:'#f5a623'},
  ];

  if(donut)donut.destroy();
  donut=new Chart(document.getElementById('donutChart').getContext('2d'),{type:'doughnut',data:{labels:expenses.map(e=>e.label),datasets:[{data:expenses.map(e=>e.val),backgroundColor:expenses.map(e=>e.color),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtCur(c.raw)}}}}});
  document.getElementById('donutLegend').innerHTML=expenses.slice(0,5).map(e=>{const pct=exp>0?Math.round(e.val/exp*100):0;return `<div class="legend-item"><div class="legend-dot" style="background:${e.color}"></div><div class="legend-right"><span>${e.label}</span><span class="legend-pct">${pct}%</span></div></div>`;}).join('');

function refreshDiagnosis(){
  const btn=document.getElementById('diag-refresh-btn');

}

function renderBudget(){

        </div>
      </div>

  document.getElementById('income-rows').innerHTML=incomes.map(i=>`
    <div class="field-row">
      <label contenteditable="true" onblur="incomes.find(x=>x.id===${i.id}).label=this.textContent.trim()" style="cursor:text;outline:none;min-width:0">${i.label}</label>
      <input type="number" value="${i.val}" min="0" oninput="updateBudget('income',${i.id},+this.value)">
      <button class="btn-small danger" onclick="removeItem('income',${i.id})" style="padding:3px 8px;font-size:11px">✕</button>
    </div>`).join('');
  document.getElementById('expense-rows').innerHTML=expenses.map(e=>`
    <div class="field-row">
      <div style="display:flex;align-items:center;gap:6px;width:132px;flex-shrink:0">
        <div style="width:8px;height:8px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
        <label contenteditable="true" onblur="expenses.find(x=>x.id===${e.id}).label=this.textContent.trim()" style="cursor:text;outline:none;flex:1;min-width:0">${e.label}</label>
      </div>
      <input type="number" value="${e.val}" min="0" oninput="updateBudget('expense',${e.id},+this.value)">

function updateBudget(type,id,val){
  if(type==='income'){const i=incomes.find(x=>x.id===id);if(i)i.val=val;}
  else{const e=expenses.find(x=>x.id===id);if(e)e.val=val;}
  const ti=document.getElementById('tot-inc');if(ti)ti.textContent=fmtCur(totalIncome());
  const te=document.getElementById('tot-exp');if(te)te.textContent=fmtCur(totalExpenses());
  saveAll();
}
function removeItem(type,id){if(type==='income')incomes=incomes.filter(x=>x.id!==id);else expenses=expenses.filter(x=>x.id!==id);renderBudget();saveAll();}
function addIncome(){incomes.push({id:nextId++,label:'Revenu',val:0});renderBudget();saveAll();}
function addExpense(){expenses.push({id:nextId++,label:'Dépense',val:0,color:CAT_COLORS[expenses.length%CAT_COLORS.length]});renderBudget();saveAll();}

function onCatChange(sel){const r=document.getElementById('new-cat-row');if(r)r.classList.toggle('visible',sel.value==='__new__');}
function confirmNewCat(){
  const inp=document.getElementById('new-cat-input');const name=inp?.value.trim();if(!name)return;
  addCategoryToBudget(name);
  const sel=document.getElementById('tk-cat');
  if(sel){sel.innerHTML=getCategories().map(c=>`<option value="${c}"${c===name?' selected':''}>${c}</option>`).join('')+`<option value="__new__">${t('f_new_cat')}</option>`;}
  if(inp)inp.value='';const r=document.getElementById('new-cat-row');if(r)r.classList.remove('visible');
}
function prevMonth(){trackerMonth--;if(trackerMonth<0){trackerMonth=11;trackerYear--;}updateTrackerData();}
function nextMonth(){trackerMonth++;if(trackerMonth>11){trackerMonth=0;trackerYear++;}updateTrackerData();}
function updateTrackerData(){
  const ml=document.getElementById('tk-month-lbl');if(ml)ml.textContent=t('months')[trackerMonth]+' '+trackerYear;
  const entries=trackerMonthEntries();const total=entries.reduce((s,e)=>s+e.amount,0);
  const dim=new Date(trackerYear,trackerMonth+1,0).getDate();
  const now=new Date();const isNow=(trackerYear===now.getFullYear()&&trackerMonth===now.getMonth());
  const elapsed=isNow?now.getDate():dim;
  const tkT=document.getElementById('tk-total');if(tkT)tkT.textContent=fmtCur(total);
  const tkC=document.getElementById('tk-count');if(tkC)tkC.textContent=entries.length;
  const tkA=document.getElementById('tk-avg');if(tkA)tkA.textContent=elapsed>0?fmtCur(total/elapsed):'—';
  const catTotals={};entries.forEach(e=>{catTotals[e.category]=(catTotals[e.category]||0)+e.amount;});
  const top=Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  const tkTp=document.getElementById('tk-top');if(tkTp)tkTp.textContent=top?top[0]:'—';
  const cf=document.getElementById('cat-filter');
  if(cf){const cats=[{k:'__all__',l:t('filter_all')},...Object.keys(catTotals).sort().map(c=>({k:c,l:c}))];cf.innerHTML=cats.map(c=>{const ia=c.k===activeFilter;const col=getCatColor(c.k);return `<button class="cat-pill${ia?' active':''}" style="${ia?'background:'+col+';':''}" onclick="setFilter('${c.k}')">${c.l}</button>`;}).join('');}
  const filtered=activeFilter==='__all__'?entries:entries.filter(e=>e.category===activeFilter);
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const lc=document.getElementById('tk-list-count');if(lc)lc.textContent='('+filtered.length+')';
  const tl=document.getElementById('tracker-list');
  if(tl)tl.innerHTML=sorted.length?sorted.map(e=>`<div class="expense-entry"><div class="entry-dot" style="background:${getCatColor(e.category)}"></div><div class="entry-info"><div class="entry-name">${e.desc}</div><div class="entry-meta">${new Date(e.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} · ${e.category}</div></div><div class="entry-amount">${fmtCur(e.amount)}</div><button class="entry-del" onclick="deleteEntry(${e.id})">✕</button></div>`).join(''):`<div class="empty-state" style="padding:24px"><div>📭</div>${t('empty_tracker')}</div>`;
  const days=Array.from({length:dim},(_,i)=>i+1);const dm={};entries.forEach(e=>{const d=parseInt(e.date.split('-')[2]);dm[d]=(dm[d]||0)+e.amount;});
  if(dailyChart)dailyChart.destroy();
  const dc=document.getElementById('dailyChart');
  if(dc)dailyChart=new Chart(dc.getContext('2d'),{type:'bar',data:{labels:days.map(String),datasets:[{data:days.map(d=>Math.round((dm[d]||0)*100)/100),backgroundColor:days.map(d=>dm[d]?'rgba(91,140,247,.8)':'rgba(91,140,247,.15)'),borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtCur(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#8892a4',font:{size:10},maxTicksLimit:14}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{color:'#8892a4',font:{size:10},callback:v=>fmtCur(v)}}}}});
  if(catDonut)catDonut.destroy();
  const cd=document.getElementById('catDonut');const ck=Object.keys(catTotals);const cv=ck.map(k=>Math.round(catTotals[k]*100)/100);const cc=ck.map(k=>getCatColor(k));
  if(cd&&ck.length)catDonut=new Chart(cd.getContext('2d'),{type:'doughnut',data:{labels:ck,datasets:[{data:cv,backgroundColor:cc,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtCur(c.raw)}}}}});
  const cl=document.getElementById('catLegend');if(cl)cl.innerHTML=ck.map((k,i)=>{const pct=total>0?Math.round(catTotals[k]/total*100):0;return `<div class="legend-item"><div class="legend-dot" style="background:${cc[i]}"></div><div class="legend-right"><span>${k}</span><span class="legend-pct">${pct}%</span></div></div>`;}).join('');
}
function setFilter(cat){activeFilter=cat;updateTrackerData();}
function addTrackerEntry(){
  const date=document.getElementById('tk-date')?.value;
  const amount=parseFloat(document.getElementById('tk-amount')?.value)||0;
  let cat=document.getElementById('tk-cat')?.value;
  const desc=document.getElementById('tk-desc')?.value.trim()||cat;
  if(!date||amount<=0)return;
  if(cat==='__new__'){const n=document.getElementById('new-cat-input')?.value.trim();if(!n)return;addCategoryToBudget(n);cat=n;}
  trackerEntries.push({id:nextId++,date,amount,category:cat,desc});
  const d=new Date(date);trackerYear=d.getFullYear();trackerMonth=d.getMonth();
  const a=document.getElementById('tk-amount');if(a)a.value='';
  const de=document.getElementById('tk-desc');if(de)de.value='';
  updateTrackerData();saveAll();
}
function deleteEntry(id){trackerEntries=trackerEntries.filter(e=>e.id!==id);updateTrackerData();saveAll();}

function renderSavings(){
  const inc=totalIncome();
  const autoAmt=autoSavingsAmt();
  const epargneNette=totalGoalContribs();
  const surplusBrut=savings();
  const contribExceedsAuto=epargneNette>autoAmt && autoAmt>0;
  const contribExceedsSurplus=epargneNette>surplusBrut;

  const alertHtml = contribExceedsSurplus
    ? `<div style="background:rgba(239,89,89,.1);border:1px solid rgba(239,89,89,.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red)">
        ⚠️ <strong>${currentLang==='fr'?'Dépassement du surplus':'Surplus exceeded'}</strong> —
        ${currentLang==='fr'
          ?'Vos contributions ('+fmtCur(epargneNette)+') dépassent votre surplus brut ('+fmtCur(surplusBrut)+'). Réduisez de <strong>'+fmtCur(epargneNette-surplusBrut)+'</strong>.'
          :'Your contributions ('+fmtCur(epargneNette)+') exceed your gross surplus ('+fmtCur(surplusBrut)+'). Reduce by <strong>'+fmtCur(epargneNette-surplusBrut)+'</strong>.'}
       </div>`
    : contribExceedsAuto
    ? `<div style="background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--amber)">
        ⚠️ <strong>${currentLang==='fr'?'Contributions trop élevées':'Contributions too high'}</strong> —
        ${currentLang==='fr'
          ?'Vos contributions ('+fmtCur(epargneNette)+') dépassent votre épargne automatique ('+fmtCur(autoAmt)+'). Réduisez de <strong>'+fmtCur(epargneNette-autoAmt)+'</strong> ou augmentez votre % automatique.'
          :'Your contributions ('+fmtCur(epargneNette)+') exceed your auto savings ('+fmtCur(autoAmt)+'). Reduce by <strong>'+fmtCur(epargneNette-autoAmt)+'</strong> or increase your auto %.'}
       </div>`
    : '';

  const el=document.getElementById('tab-savings');
  el.innerHTML=`
    <div class="sec-head">${t('sec_savings')}</div>
    <div class="sec-sub">${t('sub_savings')}</div>

    <div class="panel" style="margin-bottom:18px">
      <div class="panel-title">${t('lbl_auto_sav')}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${t('lbl_auto_sav_sub')}</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <input type="range" id="auto-pct-slider" min="0" max="50" step="1" value="${autoSavingsPct}"
          oninput="autoSavingsPct=+this.value;document.getElementById('auto-pct-num').value=this.value;document.getElementById('auto-pct-display').textContent=this.value+'%';document.getElementById('auto-amt-display').textContent='= '+fmtCur(totalIncome()*this.value/100)+'/mois';saveAll();renderDashboard();"
          style="flex:1;accent-color:var(--accent)">
        <input type="number" id="auto-pct-num" min="0" max="50" step="1" value="${autoSavingsPct}"
          oninput="let v=Math.max(0,Math.min(50,+this.value||0));autoSavingsPct=v;document.getElementById('auto-pct-slider').value=v;document.getElementById('auto-pct-display').textContent=v+'%';document.getElementById('auto-amt-display').textContent='= '+fmtCur(totalIncome()*v/100)+'/mois';saveAll();renderDashboard();"
          style="width:65px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:14px;font-weight:500;padding:6px 8px;border-radius:var(--radius-sm);outline:none;text-align:right">
        <span id="auto-pct-display" style="font-size:22px;font-weight:300;font-family:var(--font-head);color:var(--green);min-width:52px">${autoSavingsPct}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">
        <span id="auto-amt-display" style="color:var(--green);font-weight:500">= ${fmtCur(autoAmt)}/mois</span>
        <span style="color:var(--muted)">${currentLang==='fr'?'Total contributions':'Total contributions'} :
          <strong style="color:${contribExceedsSurplus?'var(--red)':contribExceedsAuto?'var(--amber)':'var(--text)'}">${fmtCur(epargneNette)}</strong>
        </span>
      </div>
    </div>

    ${alertHtml}
    <button class="btn-add" onclick="openGoalModal()">${t('btn_new_goal')}</button>
    <div id="goals-list"></div>`;

  const gl=document.getElementById('goals-list');
  if(!goals.length){gl.innerHTML=`<div class="empty-state"><div>🎯</div>${t('no_goal')}</div>`;return;}
  gl.innerHTML=goals.map(g=>{
    const pct=Math.min(100,Math.round(g.saved/g.target*100));
    const left=Math.max(0,g.target-g.saved);
    const contrib=g.monthly||0;
    const mo=contrib>0?Math.ceil(left/contrib):'∞';
    const moLabel=contrib>0?(mo+' '+t('lbl_months')):'— '+(currentLang==='fr'?'(définissez une contribution)':'(set a contribution)');
    return `<div class="goal-item">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:14px;font-weight:500">${g.name}</span>

          <span style="font-size:12px;color:var(--accent)">${pct}%</span>
          <button class="btn-small" onclick="openGoalModal(goals.find(x=>x.id===${g.id}))" style="padding:3px 8px;font-size:11px">${t('btn_edit')}</button>
          <button class="btn-small danger" onclick="deleteGoal(${g.id})" style="padding:3px 8px;font-size:11px">✕</button>
        </div>
      </div>
      <div class="prog-track" style="margin-bottom:9px"><div class="prog-fill" style="width:${pct}%;background:var(--accent)"></div></div>
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--muted)">
        <span>${t('lbl_saved')} : <strong style="color:var(--text)">${fmtCur(g.saved)}</strong></span>
        <span>${t('lbl_target')} : <strong style="color:var(--text)">${fmtCur(g.target)}</strong></span>
        <span>${t('f_monthly_contrib')} : <strong style="color:var(--green)">${contrib>0?fmtCur(contrib)+'/mois':'—'}</strong></span>
        <span>${t('lbl_left')} : <strong style="color:var(--amber)">${fmtCur(left)}</strong> · ~${moLabel}</span>
      </div>
    </div>`;
  }).join('');
}

  let bal=d.remaining,rows='';
  for(let i=1;i<=Math.min(mo,360);i++){const ia=r>0?bal*r:0;const cap=Math.min(d.monthly-ia,bal);bal=Math.max(0,bal-cap);const dt=new Date();dt.setMonth(dt.getMonth()+i);rows+=`<tr><td style="color:var(--muted)">${i}</td><td>${dt.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</td><td style="color:var(--amber)">${fmtCur(ia)}</td><td style="color:var(--green)">${fmtCur(cap)}</td><td>${fmtCur(bal)}</td></tr>`;if(bal<=0.01)break;}
  document.getElementById('amort-content').innerHTML=`<table class="amort-table"><thead><tr><th>#</th><th>Date</th><th>Int.</th><th>Cap.</th><th>Restant</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('amort-overlay').classList.add('open');
}

}
function onNumInput(id){
  const slider=document.getElementById(id);
  const numIn=document.getElementById(id+'-num');
  if(!numIn||!slider)return;
  let v=parseFloat(numIn.value)||0;
  const min=parseFloat(slider.min)||0;
  const max=parseFloat(slider.max)||200000;
  v=Math.max(min,Math.min(max,v));
  slider.value=v;

function toggleInvest(){const on=document.getElementById('invest-on').checked;const f=document.getElementById('invest-fields');f.style.opacity=on?'1':'.4';f.style.pointerEvents=on?'auto':'none';updateProj();}
function calcProjData(yrs){
  const P=+document.getElementById('ps-start').value;let m=+document.getElementById('ps-monthly').value;
  const g=+document.getElementById('ps-growth').value/100;
  const on=document.getElementById('invest-on').checked;
  const ip=+document.getElementById('ps-ipct').value/100;
  const mr=+document.getElementById('ps-rate').value/100/12;
  let sav=P,inv=0,contrib=P,labels=[],tots=[],invVals=[],contribs=[];
  for(let y=1;y<=yrs;y++){for(let mo=0;mo<12;mo++){const iv=on?m*ip:0;sav+=m-iv;if(on)inv=inv*(1+mr)+iv;contrib+=m;}m*=(1+g);labels.push(y);tots.push(Math.round(sav+inv));invVals.push(Math.round(inv));contribs.push(Math.round(contrib));}
  return{labels,tots,invVals,contribs,final:Math.round(sav+inv)};
}
function updateProj(){
  if(!document.getElementById('p-10'))return;
  const g=+document.getElementById('ps-growth').value;
  ['10','20','30'].forEach(n=>{const d=calcProjData(+n);document.getElementById('p-'+n).textContent=fmtK(d.final);document.getElementById('p-'+n+'s').textContent='+'+g.toFixed(1)+'%'+t('per_yr');});
  const d=calcProjData(projYears);if(projChart)projChart.destroy();
  const on=document.getElementById('invest-on').checked;
  const datasets=[{label:'Total',data:d.tots,borderColor:'#3ecf8e',backgroundColor:'rgba(62,207,142,.07)',fill:true,tension:.4,pointRadius:0,borderWidth:2},{label:'Contrib.',data:d.contribs,borderColor:'#5b8cf7',backgroundColor:'rgba(91,140,247,.05)',fill:true,tension:.4,pointRadius:0,borderWidth:1,borderDash:[4,3]}];
  if(on&&d.invVals.some(v=>v>0))datasets.splice(1,0,{label:'Placement',data:d.invVals,borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,.05)',fill:true,tension:.4,pointRadius:0,borderWidth:1.5,borderDash:[2,2]});
  const ctx=document.getElementById('projChart');
  if(ctx)projChart=new Chart(ctx.getContext('2d'),{type:'line',data:{labels:d.labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fmtK(c.raw)}}},scales:{x:{grid:{color:'rgba(128,128,128,.08)'},ticks:{color:'#8892a4',font:{size:11},maxTicksLimit:8}},y:{grid:{color:'rgba(128,128,128,.08)'},ticks:{color:'#8892a4',font:{size:11},callback:v=>fmtK(v)}}}}});
}
function setProjYears(n,btn){projYears=n;document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateProj();}

  if (d.incomes)        incomes        = d.incomes;
  if (d.expenses)       expenses       = d.expenses;
  if (d.goals)          goals          = d.goals.map(g => ({ monthly: 0, ...g })); // migration : ajoute monthly si absent
  if (d.debts)          debts          = d.debts;
  if (d.oweds)          oweds          = d.oweds;
  if (d.trackerEntries) trackerEntries = d.trackerEntries;
  if (d.nextId)         nextId         = d.nextId;
  if (typeof d.autoSavingsPct === 'number') autoSavingsPct = d.autoSavingsPct;
  if (d.currentCurrency) currentCurrency = d.currentCurrency;
  if (d.currentLang)    currentLang    = d.currentLang;
  if (d.currentPalette) currentPalette = d.currentPalette;
  if (d.currentMode)    currentMode    = d.currentMode;
  return d.userName || false;
}

function saveAll() {
  if (!appReady) return;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(buildPayload()));
  } catch(e) { console.warn('Sauvegarde échouée :', e); }
}

function loadSaved() {
  try {
    // 1. Cherche la clé principale
    let raw = localStorage.getItem(STORAGE_KEY);

    // 2. Migration automatique depuis les anciennes clés
    if (!raw) {
      for (const oldKey of LEGACY_KEYS) {
        raw = localStorage.getItem(oldKey);
        if (raw) {
          console.log('Migration depuis', oldKey);
          localStorage.setItem(STORAGE_KEY, raw); // copie vers la nouvelle clé
          localStorage.removeItem(oldKey);         // supprime l'ancienne
          break;
        }
      }
    }

    if (!raw) return false;
    const d = JSON.parse(raw);
    return applyPayload(d);
  } catch(e) {
    console.warn('Chargement échoué :', e);
    return false;
  }
}

// ── EXPORT ──
function exportData() {
  try {
    const payload = buildPayload();
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `finances-pro-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Erreur lors de l\'export : ' + e.message);
  }
}

// ── IMPORT ──
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const d = JSON.parse(e.target.result);
      // Validation minimale
      if (!d.incomes && !d.expenses) throw new Error('Fichier invalide');
      const name = applyPayload(d);
      saveAll();
      // Recharge l'interface
      applyTheme(currentPalette, currentMode);
      if (name) {
        launchApp(name.replace(/^(Bonjour|Bon après-midi|Bonsoir|Good morning|Good afternoon|Good evening),\s*/i,'').replace(' !','').trim());
      } else {
        renderAll();
      }
      const msg = currentLang === 'fr' ? '✅ Données importées avec succès !' : '✅ Data imported successfully!';
      alert(msg);
    } catch(err) {
      const msg = currentLang === 'fr'
        ? '❌ Fichier invalide. Assurez-vous d\'utiliser un fichier exporté depuis cette application.'
        : '❌ Invalid file. Make sure to use a file exported from this application.';
      alert(msg);
    }
  };
  reader.readAsText(file);
  // Reset input pour permettre re-import du même fichier
  event.target.value = '';
}


function resetApp() {
  const btn = document.getElementById('reset-btn');
  if (btn.dataset.pending === '1') {
    localStorage.removeItem(STORAGE_KEY);
    LEGACY_KEYS.forEach(k => localStorage.removeItem(k));
    location.reload();
  } else {
    btn.dataset.pending = '1';
    btn.textContent = '⚠️';
    btn.title = 'Cliquez à nouveau pour confirmer';
    setTimeout(() => {
      if (btn.dataset.pending === '1') {
        btn.dataset.pending = '';
        btn.textContent = '🗑️';
        btn.title = 'Réinitialiser / Reset';
      }
    }, 3000);
  }
}

// ══════════════════════════════════════════════
// RENDER ALL + START
// ══════════════════════════════════════════════
function renderAll() {
  renderNav(); buildCurSelect(); buildHdrDots();
  const active = document.querySelector('.section.active');
  const id = active ? active.id.replace('tab-', '') : 'dashboard';
  if (id === 'dashboard')       renderDashboard();
  else if (id === 'budget')     renderBudget();
  else if (id === 'tracker')    renderTracker();
  else if (id === 'savings')    renderSavings();
  else if (id === 'debts')      renderDebts();
  else if (id === 'projection') renderProjection();
  renderDashboard();
}

function launchApp(name) {
  appReady = true;
  const h = new Date().getHours();
  const g = h < 12 ? t('gm') : h < 18 ? t('ga') : t('ge');
  document.getElementById('app-greeting').textContent = g + ', ' + name + ' !';
  document.getElementById('app-sub').textContent = t('greet_sub');
  document.getElementById('welcome-screen').classList.add('hidden');
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('tab-dashboard').classList.add('active');
  // Sync header lang select
  const hl = document.getElementById('hdr-lang'); if (hl) hl.value = currentLang;
  renderAll();
  showFooter();
}

function startApp() {
  const name = (document.getElementById('w-name').value || '').trim() || 'vous';
  const code = document.getElementById('w-currency').value;
  if (code !== 'EUR') {
    const r = RATES[code] / RATES['EUR'];
    incomes.forEach(i => i.val = Math.round(i.val * r));
    expenses.forEach(e => e.val = Math.round(e.val * r));
    goals.forEach(g => { g.target = Math.round(g.target * r); g.saved = Math.round(g.saved * r); });
    debts.forEach(d => { d.capital = Math.round(d.capital * r); d.remaining = Math.round(d.remaining * r); d.monthly = Math.round(d.monthly * r); });
    trackerEntries.forEach(te => te.amount = Math.round(te.amount * r * 100) / 100);
  }
  currentCurrency = code;
  launchApp(name);
  saveAll();
}
document.getElementById('w-name').addEventListener('keydown', e => { if (e.key === 'Enter') startApp(); });

// ── INIT ──
// Try to restore saved session first
const savedName = loadSaved();
applyTheme(currentPalette, currentMode);
buildThemeSwatches('welcome-theme-grid');

if (savedName) {
  // Restore lang buttons state on welcome screen
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+currentLang+"'"));
  });
  launchApp(savedName.replace(/^(Bonjour|Bon après-midi|Bonsoir|Good morning|Good afternoon|Good evening),\s*/i, '').replace(' !','').trim());
}

document.getElementById('debt-modal-overlay').addEventListener('click',  e => { if (e.target === e.currentTarget) closeDebtModal(); });
document.getElementById('goal-modal-overlay').addEventListener('click',  e => { if (e.target === e.currentTarget) closeGoalModal(); });
document.getElementById('amort-overlay').addEventListener('click',       e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

// ── PWA SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW enregistré :', reg.scope))
      .catch(err => console.warn('SW échec :', err));
  });
}

function showFooter() {
  const f = document.getElementById('app-footer');
  if (f) f.style.display = 'block';
}
</script>
